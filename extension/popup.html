<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProcureWise</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>ProcureWise</h1>
    <div class="form">
      <label for="apiBase">API Base URL</label>
      <input type="text" id="apiBase" placeholder="http://localhost:8000" title="Backend URL (local or Railway)">
      <button type="button" id="testConnection" class="secondary">Test Connection</button>
      <button type="button" id="scanPage" class="secondary">Scan this page</button>
      <p id="scanStatus" class="scan-status hidden"></p>
      <label for="store">Store</label>
      <select id="store">
        <option value="amazon">Amazon</option>
        <option value="grainger">Grainger</option>
        <option value="page">Page (use after Scan)</option>
      </select>
      <label for="query">Describe what you need</label>
      <textarea id="query" rows="2" placeholder="e.g. I want a classic watch for everyday use, budget up to $100"></textarea>
      <button type="button" id="demoPreset" class="secondary">Demo Preset</button>
      <button id="recommend">Recommend</button>
      <p class="clear-row"><a href="#" id="clearCatalog" class="clear-link">Clear scanned catalog</a></p>
      <p class="clear-row"><a href="#" id="clearSession" class="clear-link">Clear prompt & results</a></p>
    </div>
    <div id="status" class="status hidden"></div>
    <section class="history-section">
      <h2>Price History (3 months)</h2>
      <div class="history-controls">
        <input type="text" id="historyProductId" placeholder="Product ID (auto-filled from top result)">
        <button type="button" id="loadPriceHistory" class="secondary">Load Price History</button>
      </div>
      <p id="priceHistoryStatus" class="history-status hidden"></p>
      <p id="priceHistoryStats" class="history-stats hidden"></p>
      <div id="priceHistoryChartWrap" class="history-chart-wrap hidden">
        <svg id="priceHistoryChart" viewBox="0 0 360 140" preserveAspectRatio="none"></svg>
      </div>
    </section>
    <details class="debug-details">
      <summary>Debug</summary>
      <p id="debugInfo" class="debug-info">—</p>
    </details>
    <ul id="results" class="results"></ul>
  </div>
  <script src="popup.js"></script>
</body>
</html>
