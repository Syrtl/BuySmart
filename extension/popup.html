<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuySmart</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>BuySmart</h1>
      <label class="theme-toggle" for="themeToggle" title="Toggle dark theme">
        <input type="checkbox" id="themeToggle" />
        <span class="theme-toggle-track">
          <span class="theme-toggle-thumb"></span>
        </span>
        <span class="theme-toggle-label">Dark</span>
      </label>
    </div>
    <div class="form">
      <button type="button" id="scanPage" class="secondary">Scan this page</button>
      <p id="scanStatus" class="scan-status hidden"></p>
      <label for="store">Store</label>
      <select id="store">
        <option value="amazon">Amazon</option>
        <option value="grainger">Grainger</option>
        <option value="page">Page (use after Scan)</option>
      </select>
      <label for="query">Describe what you need</label>
      <textarea id="query" rows="2" placeholder="e.g. I want a classic watch for everyday use, budget up to $100"></textarea>
      <button id="recommend">Recommend</button>
      <p class="clear-row"><a href="#" id="clearCatalog" class="clear-link">Clear scanned catalog</a></p>
      <p class="clear-row"><a href="#" id="clearSession" class="clear-link">Clear prompt & results</a></p>
    </div>
    <div id="status" class="status hidden"></div>
    <details class="debug-details">
      <summary>Debug</summary>
      <p id="debugInfo" class="debug-info">—</p>
    </details>
    <ul id="results" class="results"></ul>
  </div>
  <div id="priceHistoryModal" class="price-modal hidden">
    <div class="price-modal-backdrop" data-close="1"></div>
    <div class="price-modal-panel" role="dialog" aria-modal="true" aria-labelledby="priceHistoryModalTitle">
      <div class="price-modal-header">
        <h2 id="priceHistoryModalTitle">Price History — last 3 months</h2>
        <button type="button" id="priceHistoryModalClose" class="modal-close-btn" aria-label="Close">×</button>
      </div>
      <p id="priceHistoryModalProduct" class="price-modal-product hidden"></p>
      <p id="priceHistoryModalStatus" class="price-modal-status hidden"></p>
      <div id="priceHistoryModalChartWrap" class="price-modal-chart-wrap hidden">
        <svg id="priceHistoryModalChart" viewBox="0 0 560 200" preserveAspectRatio="none"></svg>
        <div id="priceHistoryModalTooltip" class="price-modal-tooltip hidden"></div>
      </div>
      <p id="priceHistoryModalStats" class="price-modal-stats hidden"></p>
    </div>
  </div>
  <div id="timingModal" class="timing-modal hidden">
    <div class="timing-modal-backdrop" data-close="1"></div>
    <div class="timing-modal-panel" role="dialog" aria-modal="true" aria-labelledby="timingModalTitle">
      <div class="timing-modal-header">
        <h2 id="timingModalTitle">Best Time To Buy</h2>
        <button type="button" id="timingModalClose" class="modal-close-btn" aria-label="Close">×</button>
      </div>
      <p id="timingModalProduct" class="timing-modal-product hidden"></p>
      <p id="timingModalStatus" class="timing-modal-status hidden"></p>
      <p class="timing-modal-note">Demo mode: historical prices are simulated for prototype.</p>
      <div id="timingModalBody" class="timing-modal-body hidden"></div>
    </div>
  </div>
  <div id="valueChartModal" class="value-modal hidden">
    <div class="value-modal-backdrop" data-close="1"></div>
    <div class="value-modal-panel" role="dialog" aria-modal="true" aria-labelledby="valueChartModalTitle">
      <div class="value-modal-header">
        <h2 id="valueChartModalTitle">Price vs Quality (Best Value)</h2>
        <button type="button" id="valueChartModalClose" class="modal-close-btn" aria-label="Close">×</button>
      </div>
      <p id="valueChartModalProduct" class="value-modal-product hidden"></p>
      <p id="valueChartModalStatus" class="value-modal-status hidden"></p>
      <div id="valueChartModalChartWrap" class="value-modal-chart-wrap hidden">
        <svg id="valueChartModalChart" viewBox="0 0 620 260" preserveAspectRatio="none"></svg>
        <div id="valueChartModalTooltip" class="value-modal-tooltip hidden"></div>
      </div>
      <div id="valueChartModalBody" class="value-modal-body hidden"></div>
    </div>
  </div>
  <script src="priceHistoryModal.js"></script>
  <script src="buyTimingModal.js"></script>
  <script src="valueChartModal.js"></script>
  <script src="popup.js"></script>
</body>
</html>
